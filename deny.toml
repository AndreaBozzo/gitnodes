[advisories]
ignore = [
  # Transitive through Leptos; upstream has no maintained replacement release.
  "RUSTSEC-2024-0436",
  # Transitive through the Leptos macro stack; no patched release exists.
  "RUSTSEC-2026-0173",
]

[licenses]
confidence-threshold = 0.8
allow = [
  "AGPL-3.0-or-later",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  # Transitive via webpki-roots' bundled certificate data set.
  "CDLA-Permissive-2.0",
  # Permissive (MIT-like); transitive via ring, rustls, governor, jsonwebtoken.
  "ISC",
  "MIT",
  # Weak, file-level copyleft; transitive via ammonia/CSS sanitization.
  "MPL-2.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
