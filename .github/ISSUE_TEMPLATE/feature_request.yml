name: Feature request
description: Propose a user-centered GitNodes improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the workflow or limitation, not only the desired implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: audience
    attributes:
      label: Primary audience
      options:
        - Human author
        - AI agent
        - Operator
        - Contributor
    validations:
      required: true
