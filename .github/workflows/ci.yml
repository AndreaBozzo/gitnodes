name: CI

on:
  push:
    branches: [master, staging]
  pull_request:
    branches: [master, staging]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: rust ${{ matrix.job }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        job: [fmt, clippy-ssr, clippy-hydrate, test]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.job }}

      - name: fmt
        if: matrix.job == 'fmt'
        run: cargo fmt --all -- --check

      - name: clippy (ssr)
        if: matrix.job == 'clippy-ssr'
        run: cargo clippy --no-default-features --features ssr -- -D warnings

      - name: clippy (hydrate, wasm32)
        if: matrix.job == 'clippy-hydrate'
        run: cargo clippy --no-default-features --features hydrate --target wasm32-unknown-unknown -- -D warnings

      - name: test
        if: matrix.job == 'test'
        run: cargo test --no-default-features --features ssr

  css:
    name: tailwind build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:css

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache RustSec advisory DB
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/advisory-db
            ~/.cache/cargo-audit
          key: cargo-audit-${{ runner.os }}-v1
          restore-keys: |
            cargo-audit-${{ runner.os }}-

      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  policy:
    name: dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses sources

  embedded-release:
    name: embedded release smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: embedded-release
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:css
      - run: cargo install cargo-leptos --locked --version 0.3.6
      - run: cargo leptos build --release -p gitnodes-app
      - run: cargo clippy -p gitnodes-app --bin gitnodes-app --no-default-features --features embed-assets -- -D warnings
      - run: cargo build --release -p gitnodes-app --bin gitnodes-app --no-default-features --features embed-assets
      - run: target/release/gitnodes-app --version
      - run: target/release/gitnodes-app --help
