name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: rust ${{ matrix.job }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        job: [fmt, clippy-ssr, clippy-hydrate, test]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.job }}

      - name: fmt
        if: matrix.job == 'fmt'
        run: cargo fmt --all -- --check

      - name: clippy (ssr)
        if: matrix.job == 'clippy-ssr'
        run: cargo clippy --no-default-features --features ssr -- -D warnings

      - name: clippy (hydrate, wasm32)
        if: matrix.job == 'clippy-hydrate'
        run: cargo clippy --no-default-features --features hydrate --target wasm32-unknown-unknown -- -D warnings

      - name: test
        if: matrix.job == 'test'
        run: cargo test --no-default-features --features ssr

  css:
    name: tailwind build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:css

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cache RustSec advisory DB
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/advisory-db
            ~/.cache/cargo-audit
          key: cargo-audit-${{ runner.os }}-v1
          restore-keys: |
            cargo-audit-${{ runner.os }}-

      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  policy:
    name: dependency policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check advisories licenses sources

  embedded-release:
    name: embedded release smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: embedded-release
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:css
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-leptos@0.3.6
      # Frontend only: phase 1 exists to produce target/site for the embed
      # step; the embed-assets build below already compiles the full server
      # (embed-assets implies ssr), so building it here too would just pay
      # the fat-LTO link twice.
      - run: cargo leptos build --release --frontend-only -p gitnodes-app
      - run: cargo clippy -p gitnodes-app --bin gitnodes-app --no-default-features --features embed-assets -- -D warnings
      - run: cargo build --release -p gitnodes-app --bin gitnodes-app --no-default-features --features embed-assets
      - run: target/release/gitnodes-app --version
      - run: target/release/gitnodes-app --help
