name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* tag to build and publish
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_LEPTOS_VERSION: "0.3.6"
  RUSTFLAGS: "-D warnings"
  GITNODES_BUILD_ID: ${{ github.run_id }}-${{ github.run_attempt }}
  GITNODES_RELEASE_REPOSITORY: ${{ github.repository }}
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate release tag
        shell: bash
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "::error::release tag must start with v"; exit 1 ;;
          esac
          git show-ref --verify --quiet "refs/tags/$RELEASE_TAG" || {
            echo "::error::$RELEASE_TAG is not an existing tag"
            exit 1
          }

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"

      # Prebuilt binary (checksum-verified by install-action) instead of
      # `cargo install` from source — saves ~28 min on the Windows runner.
      - name: Install cargo-leptos
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-leptos@${{ env.CARGO_LEPTOS_VERSION }}

      - name: Build CSS (Tailwind)
        run: |
          npm ci
          npm run build:css

      # Phase 1: produce target/site (WASM + JS + CSS). Frontend only — the
      # released binary is the phase-2 embed-assets build (which implies ssr),
      # so the phase-1 server binary would be built and then discarded.
      - name: cargo leptos build
        run: cargo leptos build --release --frontend-only

      # Phase 2: rebuild the server binary embedding target/site → single file.
      - name: Build single-file binary
        run: cargo build --release -p gitnodes-app --bin gitnodes-app --no-default-features --features embed-assets

      - name: Smoke-test CLI
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Windows) bin="target/release/gitnodes-app.exe" ;;
            *) bin="target/release/gitnodes-app" ;;
          esac
          "$bin" --version
          "$bin" --help

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/gitnodes-app dist/gitnodes
          tar -C dist -czf "gitnodes-${{ matrix.target }}.tar.gz" gitnodes

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/gitnodes-app.exe dist/gitnodes.exe
          Compress-Archive -Path dist/gitnodes.exe -DestinationPath "gitnodes-${{ matrix.target }}.zip" -Force

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          # Any semver pre-release tag (v…-rc.1, v…-pre) flags the GitHub release
          # as a pre-release so it never displaces the stable "Latest" badge.
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          files: gitnodes-${{ matrix.target }}.${{ matrix.archive }}

  package-metadata:
    name: package metadata
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download release archives
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --dir dist

      # Checksums ship for every release, including pre-releases, so testers can
      # verify RC binaries.
      - name: Build checksums
        shell: bash
        run: |
          cd dist
          sha256sum gitnodes-* > SHA256SUMS

      - name: Upload checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            dist/SHA256SUMS

      # Package-manager manifests (Homebrew/WinGet) are rendered for stable
      # releases only. Pre-release tags (v…-rc/-pre) ship binaries + checksums
      # for testing but must not advertise installable package metadata.
      - name: Render package manifests
        if: ${{ !contains(env.RELEASE_TAG, '-') }}
        shell: bash
        run: |
          sha_for() {
            awk -v name="$1" '$2 == name { print $1 }' dist/SHA256SUMS
          }

          scripts/render-package-manifests.sh \
            "${RELEASE_TAG#v}" \
            "$(sha_for gitnodes-x86_64-unknown-linux-gnu.tar.gz)" \
            "$(sha_for gitnodes-x86_64-apple-darwin.tar.gz)" \
            "$(sha_for gitnodes-aarch64-apple-darwin.tar.gz)" \
            "$(sha_for gitnodes-x86_64-pc-windows-msvc.zip)" \
            dist/package-manifests

      - name: Upload package manifests
        if: ${{ !contains(env.RELEASE_TAG, '-') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            dist/package-manifests/*
